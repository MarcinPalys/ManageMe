<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ManageMe - Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .story-card { cursor: pointer; transition: transform 0.2s; }
        .story-card:hover { transform: scale(1.02); }
        .active-project { border: 2px solid #0d6efd !important; background-color: #e9ecef; }
        .column-todo { border-top: 5px solid #6c757d; }
        .column-doing { border-top: 5px solid #0dcaf0; }
        .column-done { border-top: 5px solid #198754; }
    </style>
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container">
        <span class="navbar-brand mb-0 h1">🚀 ManageMe</span>
        <span id="user-info" class="navbar-text text-white"></span>
    </div>
</nav>

<div class="container">
    <div class="row">
        <div class="col-md-4">
            <div class="card shadow-sm mb-4">
                <div class="card-body">
                    <h5 class="card-title">Nowy Projekt</h5>
                    <input id="name" class="form-control mb-2" placeholder="Nazwa projektu">
                    <textarea id="description" class="form-control mb-2" placeholder="Opis"></textarea>
                    <button id="addBtn" class="btn btn-primary w-100">Dodaj projekt</button>
                </div>
            </div>
            
            <h5>Twoje Projekty</h5>
            <div id="projects" class="list-group shadow-sm">
                </div>
        </div>

        <div class="col-md-8">
            <div id="story-section" style="display:none">
                <div class="card shadow-sm mb-4">
                    <div class="card-body">
                        <h5>Nowa Historyjka</h5>
                        <div class="row g-2">
                            <div class="col-md-6">
                                <input id="storyName" class="form-control" placeholder="Nazwa zadania">
                            </div>
                            <div class="col-md-3">
                                <select id="storyPriority" class="form-select">
                                    <option value="low">Niski</option>
                                    <option value="medium">Średni</option>
                                    <option value="high">Wysoki</option>
                                </select>
                            </div>
                            <div class="col-md-3">
                                <button id="addStoryBtn" class="btn btn-success w-100">Dodaj</button>
                            </div>
                            <div class="col-12">
                                <input id="storyDesc" class="form-control" placeholder="Krótki opis">
                            </div>
                        </div>
                    </div>
                </div>

                <div class="row gx-3">
                    <div class="col-md-4">
                        <h6 class="text-center py-2 bg-secondary text-white rounded">TO DO</h6>
                        <div id="col-todo" class="py-2"></div>
                    </div>
                    <div class="col-md-4">
                        <h6 class="text-center py-2 bg-info text-white rounded">DOING</h6>
                        <div id="col-doing" class="py-2"></div>
                    </div>
                    <div class="col-md-4">
                        <h6 class="text-center py-2 bg-success text-white rounded">DONE</h6>
                        <div id="col-done" class="py-2"></div>
                    </div>
                </div>
            </div>
            
            <div id="no-project-alert" class="alert alert-secondary text-center">
                Wybierz projekt z listy po lewej, aby zobaczyć zadania.
            </div>
        </div>
    </div>
</div>

<script type="module" src="/src/main.ts"></script>
</body>
</html>
